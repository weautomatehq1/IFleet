# pnpm v11+ moved settings out of package.json#pnpm. This file is the new
# home even for single-package (non-workspace) repos. The legacy
# `onlyBuiltDependencies` key was replaced by `allowBuilds` (boolean map)
# starting in v11. Without an explicit allowlist, pnpm v11 refuses to run
# build scripts for native modules — leaving better-sqlite3 unbuilt and
# crashing the daemon at boot on a fresh install.
#
# package.json#pnpm.onlyBuiltDependencies is kept in parallel for backward
# compatibility with pnpm v10 / external tooling (CI on older runners).
# Phase 0 monorepo conversion (2026-07-09): the app source stays at the repo
# root (see apps/ifleet/README.md); workspace members are the new package
# shells under packages/* and apps/*. The root itself is the workspace root,
# not a listed member, so `pnpm -r` targets the members below.
packages:
  - "packages/*"
  - "apps/*"

allowBuilds:
  better-sqlite3: true
  esbuild: true
