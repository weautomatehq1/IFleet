# pnpm v11+ moved settings out of package.json#pnpm. This file is the new
# home even for single-package (non-workspace) repos. Without it, a fresh
# `pnpm install` warns and refuses to run install scripts for native
# modules — leaving better-sqlite3 unbuilt and crashing the daemon at boot.
#
# Keep in sync with package.json#pnpm.onlyBuiltDependencies (kept there for
# backward compatibility with pnpm <11 / external tooling).
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
