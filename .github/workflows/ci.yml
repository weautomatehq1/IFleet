name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck + Lint + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint || echo "lint not configured yet"

      - name: Test
        run: pnpm test

  shellcheck:
    name: Shellcheck + Bash-portability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      # General bash safety: error-severity gives a clean baseline on existing files.
      # shellcheck --shell=bash does not flag bash 4+ builtins (readarray, mapfile) as
      # portability issues because they are valid bash — that gap is closed by the next step.
      - name: Shellcheck (bash, error-severity)
        run: |
          find . -type f -name "*.sh" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" \
            -not -path "./.husky/_/*" \
            | xargs shellcheck --shell=bash --severity=error

      # Portability gate: ban Bash 4+ builtins that crash on macOS Bash 3.2.
      # Added after PR #145 introduced `readarray` (Bash 4+); CI passed green because
      # GitHub Actions Ubuntu runners use Bash 5+. The reviewer-subagent caught it manually.
      # Predecessor split: ~/.omc/splits/20260520-0558-cleanup-adr-smoke (HEAD 5f321f5).
      # Audit finding #9 from the brutal review of that split.
      # Pattern uses \b word boundaries (GNU grep -E, safe on Ubuntu) so that bare
      # `readarray` at EOL and `$(readarray ...)` in command substitutions are also caught
      # (the original [[:space:]] anchors required a whitespace character after the keyword).
      # The second grep drops lines whose file content starts with `#` (comment-only lines)
      # so that commented mentions of the banned builtin (e.g., `# don't use readarray`)
      # don't false-positive — only real invocations trigger the gate.
      - name: Reject Bash 4+ builtins (portability gate)
        run: |
          MATCHES=$(grep -rnE '\breadarray\b|\bmapfile\b|\bwait -n\b|\bcoproc\b' \
              --include="*.sh" \
              --exclude-dir=node_modules \
              --exclude-dir=.git \
              --exclude-dir=.husky \
              . | grep -vE '^[^:]+:[0-9]+:[[:space:]]*#' || true)
          if [ -n "$MATCHES" ]; then
            echo "ERROR: Bash 4+ builtin detected (not in a comment):"
            echo "$MATCHES"
            echo "These shell scripts must remain compatible with macOS Bash 3.2."
            echo "Replace readarray/mapfile with IFS+read loops."
            exit 1
          fi
