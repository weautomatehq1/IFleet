name: Validate Claims

# Verifies that markdown tables wrapped in <!-- claim:* src="..." --> blocks
# match the data files they cite. Scoped to .md files changed in the PR so
# pre-existing fabrications in unrelated files do not block unrelated merges.
# See scripts/validate-claims.ts and docs/elevation/anti-fabrication-audit.md.

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/validate-claims.ts"
      - ".github/workflows/validate-claims.yml"
      - ".ifleet/eval/*.json"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/validate-claims.ts"

jobs:
  validate-claims:
    name: Validate doc claims against data files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with base ref for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Resolve base ref
        id: base
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/main" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate claim blocks (changed files only)
        run: |
          npm run validate-claims -- --changed-only --base "${{ steps.base.outputs.ref }}"
