rules:
  # ── Rule 1 ──────────────────────────────────────────────────────────────────
  # Enforces: "SprintManager emits events, never calls GitHub directly"
  # Source: IFleet CLAUDE.md architecture rule + IFleet memory entry
  # All GitHub API interactions must flow through src/queue/ (the bridge layer).
  # Coupling sprint logic to the Octokit client directly creates a hidden
  # dependency on GitHub rate limits and webhook quirks.
  - id: no-github-outside-queue
    message: >
      GitHub API calls are only allowed inside src/queue/**. SprintManager emits
      events — it never calls GitHub directly. Move this call behind the queue bridge.
    severity: ERROR
    languages: [typescript]
    patterns:
      - pattern-either:
          # new Octokit(...) or new Octokit.App(...)
          - pattern: new Octokit(...)
          # octokit.rest.* method calls
          - pattern: $OC.rest.$NS.$METHOD(...)
          # raw fetch/axios to api.github.com
          - pattern: |
              fetch("https://api.github.com/...")
          - pattern: |
              fetch(`https://api.github.com/...`)
    paths:
      exclude:
        - src/queue/**
        - src/agents/verifier/**   # verifier reads PR status — allowed read-only
        - "**/__tests__/**"
        - "**/*.test.ts"

  # ── Rule 2 ──────────────────────────────────────────────────────────────────
  # Enforces: "Editor must be Sonnet floor — never Haiku for editing code" (PR #73)
  # The editor produces the actual code change; Haiku is too weak and produced
  # regressions that burned review cycles. Sonnet is the minimum acceptable model.
  - id: no-haiku-in-editor
    message: >
      Editor must use Sonnet or higher. Haiku is below the quality floor for code
      edits (see PR #73). Use a model string that does NOT contain 'haiku'.
    severity: ERROR
    languages: [typescript]
    patterns:
      - pattern: |
          "$MODEL"
      - metavariable-regex:
          metavariable: $MODEL
          regex: '.*haiku.*'
    paths:
      include:
        - src/pipeline/editor.ts
        - src/pipeline/runner.ts
        - src/pipeline/factory.ts

  # ── Rule 3 ──────────────────────────────────────────────────────────────────
  # Enforces: global CLAUDE.md "Never skip git hooks"
  # --no-verify bypasses pre-commit hooks that enforce quality gates.
  # This is categorically banned; it masks broken state and defeats the invariant
  # system itself.
  - id: no-no-verify
    message: >
      --no-verify is banned. Never skip git hooks. Fix the underlying hook failure
      instead of bypassing it.
    severity: ERROR
    languages: [typescript, javascript, bash]
    pattern-either:
      - pattern: |
          "$CMD"
      - pattern: |
          `$CMD`
    patterns:
      - pattern-either:
          - pattern: |
              "$S"
          - pattern: |
              `$S`
      - metavariable-regex:
          metavariable: $S
          regex: '.*--no-verify.*'

  # ── Rule 4 ──────────────────────────────────────────────────────────────────
  # Enforces: "Centralise process.env reads in src/config/"
  # Scattering process.env reads across the codebase makes configuration drift
  # invisible. All env access must go through the typed config layer so that
  # missing vars surface at startup, not deep in a request path.
  - id: no-env-outside-config
    message: >
      process.env access is only allowed in src/config/**. Read env vars through
      the typed config layer (src/config/index.ts) instead.
    severity: ERROR
    languages: [typescript]
    pattern: process.env.$VAR
    paths:
      exclude:
        - src/config/**
        - scripts/**            # CLI scripts read env directly — acceptable
        - "**/__tests__/**"
        - "**/*.test.ts"
        - .ifleet/**
