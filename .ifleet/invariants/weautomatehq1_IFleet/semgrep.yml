rules:
  # ── Rule 1 ──────────────────────────────────────────────────────────────────
  # Enforces: "SprintManager emits events, never calls GitHub directly"
  # Source: IFleet CLAUDE.md architecture rule
  # All GitHub API interactions must flow through src/queue/ (the bridge layer).
  - id: no-github-outside-queue
    message: >
      GitHub API calls are only allowed inside src/queue/**. SprintManager emits
      events — it never calls GitHub directly. Move this call behind the queue bridge.
    severity: ERROR
    languages: [typescript]
    patterns:
      - pattern-either:
          # new Octokit(...) constructor
          - pattern: new Octokit(...)
          # octokit.rest.<namespace>.<method>(...) calls
          - pattern: $OC.rest.$NS.$METHOD(...)
          # fetch() to api.github.com — metavariable-regex checks source text of $URL
          - patterns:
              - pattern: fetch($URL, ...)
              - metavariable-regex:
                  metavariable: $URL
                  regex: '"https://api\.github\.com/[^"]*"'
          - patterns:
              - pattern: fetch($URL)
              - metavariable-regex:
                  metavariable: $URL
                  regex: '"https://api\.github\.com/[^"]*"'
    paths:
      exclude:
        - src/queue/**
        - "**/__tests__/**"
        - "**/*.test.ts"

  # ── Rule 2 ──────────────────────────────────────────────────────────────────
  # Enforces: "Editor must be Sonnet floor — never Haiku for editing code" (PR #73)
  # The editor produces the actual code change; Haiku produced regressions that
  # burned review cycles. Sonnet is the minimum acceptable model.
  #
  # Uses pattern-regex because metavariable-regex on "$MODEL" binds to the AST
  # string node (including quotes), not its text content — making it unreliable
  # for content matching. pattern-regex is unambiguous text search.
  - id: no-haiku-in-editor
    message: >
      Editor must use Sonnet or higher. Haiku is below the quality floor for code
      edits (see PR #73). Remove the claude-haiku-* model string from this file.
    severity: ERROR
    languages: [typescript]
    pattern-regex: '"claude-haiku[^"]*"'
    paths:
      include:
        - src/pipeline/editor.ts

  # ── Rule 3 ──────────────────────────────────────────────────────────────────
  # Enforces: global CLAUDE.md "Never skip git hooks"
  # --no-verify bypasses pre-commit hooks that enforce quality gates.
  # This is categorically banned; it defeats the invariant system itself.
  #
  # Uses pattern-regex — simpler and correct for a literal flag string.
  # The original dual pattern-either + patterns structure was invalid Semgrep
  # (two root-level match keys); collapsed here to a single operator.
  - id: no-no-verify
    message: >
      --no-verify is banned. Never skip git hooks. Fix the underlying hook failure
      instead of bypassing it.
    severity: ERROR
    languages: [typescript, javascript, bash]
    pattern-regex: '--no-verify'

  # ── Rule 4 ──────────────────────────────────────────────────────────────────
  # Enforces: "Centralise process.env reads in src/config/"
  # Scattering process.env reads makes configuration drift invisible.
  #
  # Scope: only src/orchestrator/** and src/agents/** — the high-level
  # coordination layers that must stay clean. Other layers (discord, verify,
  # repos, workers) have known legitimate env reads and are excluded by not
  # being in the include list. Expand the include list as each layer is
  # migrated to the typed config layer.
  - id: no-env-outside-config
    message: >
      process.env access is only allowed in src/config/**. Read env vars through
      the typed config layer (src/config/index.ts) instead.
    severity: ERROR
    languages: [typescript]
    pattern: process.env.$VAR
    paths:
      include:
        - src/orchestrator/**
        - src/agents/**
