server {
    listen 80;
    listen [::]:80;
    server_name langfuse.weautomatehq.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name langfuse.weautomatehq.cloud;

    # certbot will inject ssl_certificate / ssl_certificate_key lines on first run.
    # Until then, this server block won't load — that's expected.

    # Langfuse uploads traces/screenshots/files; allow generous bodies but not unbounded.
    # 25MB matches Langfuse Cloud's per-event ceiling.
    client_max_body_size 25m;
    client_body_timeout 60s;

    # Hide nginx version.
    server_tokens off;

    # Basic hardening headers. Langfuse is a single-tenant internal tool here,
    # not embedded in third-party pages, so DENY framing is correct.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Public health endpoint — for external monitors / smoke checks.
    location = /api/public/health {
        proxy_pass http://127.0.0.1:3010/api/public/health;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # Everything else routes through the Langfuse web container.
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket upgrade for live trace streaming.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Langfuse occasionally hangs server-streamed responses up to 60s.
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # No access to dotfiles.
    location ~ /\. {
        return 404;
    }
}
