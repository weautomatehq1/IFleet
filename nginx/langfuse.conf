server {
    listen 80;
    listen [::]:80;
    server_name langfuse.weautomatehq.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name langfuse.weautomatehq.cloud;

    # certbot will inject ssl_certificate / ssl_certificate_key lines on first run.
    # Until then, this server block won't load — that's expected.

    # Langfuse uploads traces/screenshots/files; allow generous bodies but not unbounded.
    # 25MB matches Langfuse Cloud's per-event ceiling.
    client_max_body_size 25m;
    client_body_timeout 60s;

    # Hide nginx version.
    server_tokens off;

    # Basic hardening headers. Langfuse is a single-tenant internal tool here,
    # not embedded in third-party pages, so DENY framing is correct.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # ---------------------------------------------------------------------------
    # Access gate (AUDIT-IFleet-9ccde08e)
    # ---------------------------------------------------------------------------
    # Langfuse self-host ships with OPEN SIGN-UP by default, so an ungated vhost
    # lets anyone who reaches the host register an account and read every captured
    # trace (prompts, code, secrets in payloads). We gate the human-facing surface
    # (UI + tRPC/internal API) behind HTTP Basic auth at the nginx edge.
    #
    # Two carve-outs stay UNGATED at the nginx layer because they are NOT the
    # sign-up surface and adding Basic auth here would break them:
    #   1. `= /api/public/health` — unauthenticated probe for external monitors.
    #   2. `/api/public/`        — Langfuse's public ingestion API (ingestion,
    #      OTel, etc.). The SDK authenticates these with the project's Langfuse
    #      public/secret keys via its OWN HTTP Basic header; layering an nginx
    #      auth_basic on top would collide with that header and drop traces.
    #      These endpoints are already key-authenticated by Langfuse itself.
    #
    # Operator must provision /etc/nginx/.htpasswd-langfuse on the host, e.g.:
    #   htpasswd -c /etc/nginx/.htpasswd-langfuse admin
    # (NOT committed — credentials live only on the VPS.)
    # ---------------------------------------------------------------------------

    # Public health endpoint — for external monitors / smoke checks. (UNGATED)
    location = /api/public/health {
        proxy_pass http://127.0.0.1:3010/api/public/health;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # Public ingestion API — SDK-key authenticated by Langfuse, NOT nginx. (UNGATED)
    # Trace ingestion (/api/public/ingestion), OTel, etc. must keep flowing.
    location /api/public/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # Everything else — UI, sign-up/login, tRPC/internal API — is GATED behind
    # HTTP Basic auth so open sign-up is no longer reachable from the internet.
    location / {
        auth_basic "Langfuse";
        auth_basic_user_file /etc/nginx/.htpasswd-langfuse;

        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket upgrade for live trace streaming.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Langfuse occasionally hangs server-streamed responses up to 60s.
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # No access to dotfiles.
    location ~ /\. {
        return 404;
    }
}
