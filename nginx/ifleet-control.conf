# nginx config for the public IFleet ControlPlane.
#
# Proxies https://<host>/control → http://127.0.0.1:3001/control. TLS
# terminated here; the upstream control-plane process speaks plain HTTP on
# localhost only. /healthz is the liveness probe.
#
# Drop into /etc/nginx/sites-available/ifleet-control.conf and symlink into
# sites-enabled/.

server {
    listen 80;
    listen [::]:80;
    server_name ifleet-control.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ifleet-control.example.com;

    ssl_certificate     /etc/letsencrypt/live/ifleet-control.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ifleet-control.example.com/privkey.pem;

    # Pin TLS versions and let the client pick the cipher (modern OpenSSL
    # defaults are stronger than any list we'd maintain by hand).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Strict-Transport-Security: tells browsers to refuse plain HTTP for a
    # year. `always` makes nginx emit the header even on 4xx / 5xx so a
    # downgrade attack on an error page still fails.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Don't advertise the nginx version in headers or error pages.
    server_tokens off;

    # Cap body size — control commands are tiny JSON, anything bigger is
    # likely an attempt to exhaust memory.
    client_max_body_size 64k;

    location /healthz {
        proxy_pass http://127.0.0.1:3001/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /control {
        proxy_pass http://127.0.0.1:3001/control;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-IFleet-Signature $http_x_ifleet_signature;
        proxy_set_header X-IFleet-Timestamp $http_x_ifleet_timestamp;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}
