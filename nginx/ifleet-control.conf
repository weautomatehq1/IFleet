server {
    listen 80;
    listen [::]:80;
    server_name control.weautomatehq.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name control.weautomatehq.cloud;

    # certbot will inject ssl_certificate / ssl_certificate_key lines on first run.
    # Until then, this server block won't load — that's expected.

    # ControlPlane caps payload at 64KB. nginx default is 1m; tighten to give a
    # cleaner 413 instead of letting Node parse oversize bodies.
    client_max_body_size 128k;
    client_body_timeout 15s;

    # Hide nginx version.
    server_tokens off;

    # Basic hardening headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Health endpoint — used by deploy.sh smoke check + external monitors.
    location = /healthz {
        proxy_pass http://127.0.0.1:3001/healthz;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # HMAC-signed command intake. Pass the signature headers through (default
    # nginx behavior, declared here for clarity).
    location = /control {
        proxy_pass http://127.0.0.1:3001/control;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass_request_headers on;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Everything else is forbidden.
    location / {
        return 404;
    }

    # No access to dotfiles.
    location ~ /\. {
        return 404;
    }
}
